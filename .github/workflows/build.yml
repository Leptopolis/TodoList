name: Build Windows App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
      
      - name: Build JAR
        run: ./mvnw clean package -DskipTests
      
      - name: Install WiX
        run: choco install wixtoolset -y
      
      - name: Create EXE
        run: |
          jpackage `
            --input target/ `
            --name TodoApp `
            --main-jar todoList-0.0.1-SNAPSHOT.jar `
            --main-class com.example.todoList.TodoListApplication `
            --type app-image `
            --dest dist/
      
      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: TodoApp-Windows
          path: dist/TodoApp/