name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Liberica Full JDK (includes JavaFX)
        uses: actions/setup-java@v4
        with:
          distribution: 'liberica'
          java-version: '17'
          type: 'jdk'

      - name: Cache Maven dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Build JAR
        run: ./mvnw clean package -DskipTests

      - name: Install WiX Toolset
        run: choco install wixtoolset -y

      - name: Create Windows app-image (portable EXE)
        run: |
          jpackage `
            --input target/ `
            --name TodoList `
            --main-jar todoList-0.0.1-SNAPSHOT.jar `
            --main-class com.example.todoList.TodoListApplication `
            --type app-image `
            --dest dist/ `
            --win-console `
            --vendor "YourName" `
            --copyright "2026 YourName" `
            --app-version "1.0.0"

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: TodoList-Windows
          path: dist/TodoList/