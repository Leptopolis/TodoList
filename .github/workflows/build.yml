name: Build Windows .exe

on:
  push:
    branches: [ "main" ]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Build JAR (skip tests)
        run: ./mvnw clean package -DskipTests   # ← КЛЮЧЕВОЕ ИЗМЕНЕНИЕ

      - name: Install WiX Toolset
        run: choco install wixtoolset -y

      - name: Create Windows .exe
        run: |
          jpackage --input target/ --name TodoList --main-jar todoList-0.0.1-SNAPSHOT.jar --main-class com.example.todoList.TodoListApplication --type exe --dest dist/ --win-dir-chooser --win-shortcut --win-menu

      - name: Upload .exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: TodoList-Windows-Installer
          path: dist/*.exe