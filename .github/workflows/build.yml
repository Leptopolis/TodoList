name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build JAR (flat structure)
        run: ./mvnw clean package -DskipTests

      - name: Download JavaFX SDK
        run: |
          curl -L -o javafx.zip https://download2.gluonhq.com/openjfx/17.0.2/openjfx-17.0.2_windows-x64_bin-sdk.zip
          unzip javafx.zip -d C:/

      - name: Install WiX Toolset
        run: choco install wixtoolset -y

      - name: Create EXE with JavaFX
        run: |
          jpackage `
            --input target/ `
            --name TodoList `
            --main-jar todoList-0.0.1-SNAPSHOT.jar `
            --main-class com.example.todoList.TodoListApplication `
            --type app-image `
            --dest dist/ `
            --win-console `
            --module-path "C:/javafx-sdk-17.0.2/lib" `
            --add-modules javafx.controls,javafx.fxml

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: TodoList-Windows
          path: dist/TodoList/