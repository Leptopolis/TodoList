name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Liberica Full JDK (includes JavaFX)
        uses: actions/setup-java@v4
        with:
          distribution: 'liberica'
          java-version: '17'
          type: 'jdk'
          check-latest: true

      - name: Cache Maven dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Build JAR
        run: ./mvnw clean package -DskipTests

      - name: Install WiX Toolset (required for jpackage)
        run: choco install wixtoolset -y

      - name: Create Windows EXE with embedded JavaFX
          run: |
            jpackage `
              --input target/ `
              --name TodoList `
              --main-jar todoList-0.0.1-SNAPSHOT.jar `
              --main-class com.example.todoList.TodoListApplication `
              --type app-image `
              --dest dist/ `
              --win-console `
              --add-modules javafx.controls,javafx.fxml

      - name: Upload EXE as artifact
        uses: actions/upload-artifact@v4
        with:
          name: TodoList-Windows
          path: dist/TodoList/