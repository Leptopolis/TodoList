# ====================
# Server Configuration
# ====================
server.port=8080

# ====================
# H2 Database Configuration
# ====================

#spring.datasource.url=jdbc:h2:~/todo_db 
spring.datasource.url=jdbc:h2:./todo_db
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ====================
# H2 Console (для просмотра БД в браузере)
# ====================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ====================
# JPA / Hibernate Configuration
# ====================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# ====================
# Jackson Date/Time Configuration
# ====================
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=Europe/Moscow

# ====================
# Logging Configuration
# ====================
logging.level.com.example.todoList=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ====================
# Application Name
# ====================
spring.application.name=todoList

# ====================
# Optional: для десктопного приложения (если используешь JavaFX)
# ====================
# spring.main.web-application-type=none
# spring.main.banner-mode=off